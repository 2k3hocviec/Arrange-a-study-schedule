services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-school1}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school1}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  database-init:
    build:
      context: ./backend
      target: deps
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/school1?schema=public}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma db push &&
        if [ \"${RUN_DB_SEED:-true}\" = \"true\" ]; then
          npm run seed;
        else
          echo 'Skipping seed because RUN_DB_SEED is not true';
        fi
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/school1?schema=public}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy
      database-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
